name: "Deploy backend to the EC2 server"

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/actions-runner/_work/
    steps:
      - name: "Cloning the  github repository"
        uses: actions/checkout@v2

      - name: "check pwd"
        run: pwd

      - name: "run the docker compose cotainer"
        run: |
          docker compose down
          docker compose build --no-cache
          docker compose up -d

      - name: "Clean up old Docker images/containers"
        run: |
          docker container prune -f
          docker image prune -af
          docker volume prune -f
          # docker builder prune -af
